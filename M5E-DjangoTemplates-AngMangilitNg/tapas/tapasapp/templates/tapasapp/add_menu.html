{% extends 'tapasapp/base.html' %}
{% load static %}

{% block sidebar %}
<ul>
    <li>Back to main</li>
</ul>
{% endblock %}

{% block content %}
<div class="card h-100 col-9">

    <div class="card-header bg-light py-3">
        <h3>Type in Dish Details:</h3>
    </div>

    <div class="px-3">

        <div class="row g-3 mt-1">
            <div class="col-12 pb-3">
                <label for="name" class="form-label">Name:</label>
                <input type="text" id="name" class="form-control">
            </div>
        </div>

        <div class="row gx-5">
            <div class="col-6">
                <label for="cook_time" class="form-label">Cook Time:</label>
                <input type="text" id="cook_time" class="form-control w-50">
            </div>

            <div class="col-6">
                <label for="prep_time" class="form-label">Prep Time:</label>
                <input type="text" id="prep_time" class="form-control w-50">
            </div>
        </div>

        <div class="text-start py-4">
            <button class="btn btn-secondarys">Add to Dishes</button>
        </div>

    </div>

</div>
{% endblock %}
